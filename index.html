<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator With History</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrapper">

    <header class="header">
      <div class="header-accent"></div>
      <h1 class="title">Calc<span>_</span>History</h1>
      <p class="subtitle">A calculator that remembers</p>
    </header>

    <main class="main-grid">

      <!-- LEFT: Calculator panel -->
      <section class="panel calc-panel">
        <div class="panel-label">CALCULATE</div>

        <div class="display" id="display">
          <span class="display-placeholder">8 + 5</span>
        </div>

        <div class="keypad">
          <!-- Number + operator buttons -->
          <button class="key key-num" data-val="7">7</button>
          <button class="key key-num" data-val="8">8</button>
          <button class="key key-num" data-val="9">9</button>
          <button class="key key-op" data-val=" / ">÷</button>

          <button class="key key-num" data-val="4">4</button>
          <button class="key key-num" data-val="5">5</button>
          <button class="key key-num" data-val="6">6</button>
          <button class="key key-op" data-val=" * ">×</button>

          <button class="key key-num" data-val="1">1</button>
          <button class="key key-num" data-val="2">2</button>
          <button class="key key-num" data-val="3">3</button>
          <button class="key key-op" data-val=" - ">−</button>

          <button class="key key-num" data-val="0">0</button>
          <button class="key key-num" data-val=".">.</button>
          <button class="key key-action key-back" id="backspace">⌫</button>
          <button class="key key-op" data-val=" + ">+</button>
        </div>

        <div class="calc-actions">
          <button class="btn btn-secondary" id="btn-clear-input">Clear</button>
          <button class="btn btn-primary" id="btn-calculate">= Calculate</button>
        </div>

        <div class="result-box" id="result-box">
          <span id="result-text"></span>
        </div>

        <div class="error-box" id="error-box">
          <span id="error-text"></span>
        </div>
      </section>

      <!-- RIGHT: History panel -->
      <section class="panel history-panel">
        <div class="panel-label">HISTORY</div>

        <div class="history-list" id="history-list">
          <div class="history-empty" id="history-empty">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/>
            </svg>
            <p>No history yet</p>
          </div>
        </div>

        <div class="history-footer">
          <button class="btn btn-ghost" id="btn-clear-history">Clear History</button>
        </div>
      </section>

    </main>

  </div>

  <script src="script.js"></script>
  <script>
    // ── Inline script so no extra file is needed ──
    const display     = document.getElementById('display');
    const resultBox   = document.getElementById('result-box');
    const resultText  = document.getElementById('result-text');
    const errorBox    = document.getElementById('error-box');
    const errorText   = document.getElementById('error-text');
    const historyList = document.getElementById('history-list');
    const historyEmpty= document.getElementById('history-empty');

    const STORAGE_KEY = 'calc_history';
    let inputValue = '';

    // ── Storage helpers ──
    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveHistory(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    // ── Display helpers ──
    function updateDisplay() {
      display.innerHTML = inputValue
        ? `<span class="display-value">${inputValue}</span>`
        : `<span class="display-placeholder">8 + 5</span>`;
    }
    function showResult(msg) {
      resultBox.classList.add('visible');
      resultText.textContent = msg;
      errorBox.classList.remove('visible');
    }
    function showError(msg) {
      errorBox.classList.add('visible');
      errorText.textContent = msg;
      resultBox.classList.remove('visible');
    }
    function clearFeedback() {
      resultBox.classList.remove('visible');
      errorBox.classList.remove('visible');
    }

    // ── History rendering ──
    function renderHistory() {
      const history = loadHistory();
      historyList.querySelectorAll('.history-item').forEach(el => el.remove());
      if (history.length === 0) {
        historyEmpty.style.display = 'flex';
        return;
      }
      historyEmpty.style.display = 'none';
      [...history].reverse().forEach((entry, i) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.style.animationDelay = `${i * 40}ms`;
        div.innerHTML = `<span class="hi-expr">${entry.expr}</span><span class="hi-eq">=</span><span class="hi-result">${entry.result}</span>`;
        div.addEventListener('click', () => {
          inputValue = entry.expr;
          updateDisplay();
          clearFeedback();
        });
        historyList.appendChild(div);
      });
    }

    function addToHistory(expr, result) {
      const history = loadHistory();
      history.push({ expr, result });
      saveHistory(history);
      renderHistory();
    }

    // ── Calculation ──
    function calculate() {
      const raw = inputValue.trim();
      if (!raw) { showError('Please enter a calculation.'); return; }

      const parts = raw.split(/\s+/);
      if (parts.length !== 3) { showError('Format: number  operator  number'); return; }

      const num1 = parseFloat(parts[0]);
      const op   = parts[1];
      const num2 = parseFloat(parts[2]);

      if (isNaN(num1) || isNaN(num2)) { showError('Invalid numbers entered.'); return; }

      let result;
      if      (op === '+') result = num1 + num2;
      else if (op === '-') result = num1 - num2;
      else if (op === '*') result = num1 * num2;
      else if (op === '/') {
        if (num2 === 0) { showError('Error: Cannot divide by zero.'); return; }
        result = num1 / num2;
      } else {
        showError('Invalid operator. Use +  −  ×  ÷');
        return;
      }

      // Tidy the result
      const nice = parseFloat(result.toFixed(10));
      const expr = `${num1} ${op} ${num2}`;
      showResult(`${expr} = ${nice}`);
      addToHistory(expr, nice);
    }

    // ── Key events ──
    document.querySelectorAll('.key[data-val]').forEach(btn => {
      btn.addEventListener('click', () => {
        inputValue += btn.dataset.val;
        updateDisplay();
        clearFeedback();
        btn.classList.add('pressed');
        setTimeout(() => btn.classList.remove('pressed'), 120);
      });
    });

    document.getElementById('backspace').addEventListener('click', () => {
      inputValue = inputValue.slice(0, -1);
      updateDisplay();
      clearFeedback();
    });

    document.getElementById('btn-clear-input').addEventListener('click', () => {
      inputValue = '';
      updateDisplay();
      clearFeedback();
    });

    document.getElementById('btn-calculate').addEventListener('click', calculate);

    document.getElementById('btn-clear-history').addEventListener('click', () => {
      saveHistory([]);
      renderHistory();
    });

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter')     { calculate(); return; }
      if (e.key === 'Backspace') { inputValue = inputValue.slice(0, -1); updateDisplay(); clearFeedback(); return; }
      if (e.key === 'Escape')    { inputValue = ''; updateDisplay(); clearFeedback(); return; }
      if (/^[0-9.]$/.test(e.key))     { inputValue += e.key; updateDisplay(); clearFeedback(); }
      if (['+','-','*','/'].includes(e.key)) { inputValue += ` ${e.key} `; updateDisplay(); clearFeedback(); }
    });

    // Init
    updateDisplay();
    renderHistory();
  </script>

</body>
</html>
